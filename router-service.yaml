apiVersion: v1
kind: Service
metadata:
  name: bg-app-router
  labels:
    app: bg-app
    role: router
  annotations:
    description: "Router service that switches between blue and green versions"
spec:
  type: NodePort
  selector:
    app: bg-app
    version: blue  # Start with blue; will be patched by deployment script
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30050
  sessionAffinity: None
